name: OutdoorAdvisor Push Scheduler

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-push-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger push alert engine
        env:
          OA_CRON_SECRET: ${{ secrets.OA_CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${OA_CRON_SECRET}" \
            "https://outdooradvisor.app/api/push?action=cron&mode=github-actions"
