<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>

    <!-- ── Backgrounds ── -->
    <linearGradient id="bg" x1="0.18" y1="0" x2="0.82" y2="1">
      <stop offset="0%"   stop-color="#151F30"/>
      <stop offset="42%"  stop-color="#1E2E46"/>
      <stop offset="100%" stop-color="#2E4260"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="36%" r="52%">
      <stop offset="0%"   stop-color="#3A6898" stop-opacity="0.45"/>
      <stop offset="55%"  stop-color="#233550" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#151F30" stop-opacity="0"/>
    </radialGradient>

    <!-- ── Atmosphere blobs ── -->
    <filter id="blur50"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="blur30"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blur18"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>

    <!-- ── Mountain faces ── -->
    <linearGradient id="mtnRight" x1="0.5" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#C8E6FF"/>
      <stop offset="35%"  stop-color="#9BC8FF"/>
      <stop offset="100%" stop-color="#4B82C0"/>
    </linearGradient>

    <linearGradient id="mtnLeft" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#5B8DC8"/>
      <stop offset="100%" stop-color="#1C3D68"/>
    </linearGradient>

    <linearGradient id="mtnRidge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#EEF8FF" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#C8E6FF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7FB2FF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Back peak -->
    <linearGradient id="mtnBackGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#7AB0E0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#2A508A" stop-opacity="0.40"/>
    </linearGradient>

    <!-- ── Peak glow ── -->
    <radialGradient id="peakGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.95"/>
      <stop offset="30%"  stop-color="#C8E6FF"  stop-opacity="0.6"/>
      <stop offset="65%"  stop-color="#9BC8FF"  stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9BC8FF"  stop-opacity="0"/>
    </radialGradient>

    <!-- ── Glass plate ── -->
    <linearGradient id="glassFill" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.15"/>
      <stop offset="50%"  stop-color="#9BC8FF"  stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7FB2FF"  stop-opacity="0.03"/>
    </linearGradient>

    <!-- Top specular highlight -->
    <radialGradient id="topSheen" cx="50%" cy="0%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#FFFFFF"  stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF"  stop-opacity="0"/>
    </radialGradient>

    <!-- ── Horizon & reflection ── -->
    <linearGradient id="reflGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#9BC8FF"  stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7FB2FF"  stop-opacity="0.04"/>
    </linearGradient>

    <!-- Water shimmer line -->
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#9BC8FF"  stop-opacity="0"/>
      <stop offset="30%"  stop-color="#C8E6FF"  stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#EEF8FF"  stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#C8E6FF"  stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9BC8FF"  stop-opacity="0"/>
    </linearGradient>

    <!-- ── Border glow ── -->
    <linearGradient id="borderGlow" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF"  stop-opacity="0.42"/>
      <stop offset="40%"  stop-color="#9BC8FF"  stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7FB2FF"  stop-opacity="0.10"/>
    </linearGradient>

    <!-- ── Glow filter for mountain ── -->
    <filter id="mountainGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="gb"/>
      <feFlood flood-color="#9BC8FF" flood-opacity="0.55" result="col"/>
      <feComposite in="col" in2="gb" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Squircle clip -->
    <clipPath id="sq">
      <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>

  </defs>

  <!-- ══════════════════════════════════
       ALL LAYERS (clipped to squircle)
       ══════════════════════════════════ -->
  <g clip-path="url(#sq)">

    <!-- 1 ▸ Background gradient -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- 2 ▸ Atmospheric glow (upper-center) -->
    <rect width="1024" height="1024" fill="url(#bgGlow)"/>

    <!-- 3 ▸ Cyan blob — upper center -->
    <ellipse cx="512" cy="360" rx="420" ry="300"
             fill="rgba(122,178,255,0.10)" filter="url(#blur50)"/>

    <!-- 4 ▸ Teal blob — lower right -->
    <ellipse cx="740" cy="770" rx="300" ry="220"
             fill="rgba(126,222,232,0.07)" filter="url(#blur50)"/>

    <!-- ── MOUNTAINS (behind glass) ── -->

    <!-- 5 ▸ Back peak (far left) -->
    <polygon points="342,445 468,688 216,688"
             fill="url(#mtnBackGrad)"/>

    <!-- 6 ▸ Back peak right (subtle) -->
    <polygon points="688,500 784,688 592,688"
             fill="rgba(90,140,200,0.30)"/>

    <!-- 7 ▸ Main mountain — left face (shadow) -->
    <polygon points="512,242 512,688 268,688"
             fill="url(#mtnLeft)" filter="url(#mountainGlow)"/>

    <!-- 8 ▸ Main mountain — right face (lit) -->
    <polygon points="512,242 756,688 512,688"
             fill="url(#mtnRight)" filter="url(#mountainGlow)"/>

    <!-- 9 ▸ Ridge specular line (the glass edge between faces) -->
    <polygon points="512,242 519,688 505,688"
             fill="url(#mtnRidge)" opacity="0.90"/>

    <!-- 10 ▸ Peak glow halo -->
    <ellipse cx="512" cy="255" rx="90" ry="70"
             fill="url(#peakGlow)"/>

    <!-- 11 ▸ Peak star dot -->
    <circle cx="512" cy="242" r="5.5" fill="#EEF8FF" opacity="0.95"/>

    <!-- 12 ▸ Light ray upward from peak -->
    <line x1="512" y1="130" x2="512" y2="246"
          stroke="rgba(238,248,255,0.35)" stroke-width="2.5"
          stroke-linecap="round"/>

    <!-- ── HORIZON + REFLECTION ── -->

    <!-- 13 ▸ Horizon line (glass floor edge) -->
    <rect x="0" y="688" width="1024" height="2" rx="1"
          fill="url(#shimmer)"/>

    <!-- 14 ▸ Reflection zone (dark water/glass) -->
    <rect x="0" y="690" width="1024" height="334"
          fill="rgba(10,16,28,0.55)"/>

    <!-- 15 ▸ Reflected mountain (faint, inverted) -->
    <g transform="translate(0,1378) scale(1,-1)" opacity="0.14">
      <polygon points="512,242 756,688 512,688" fill="url(#mtnRight)"/>
      <polygon points="512,242 512,688 268,688" fill="url(#mtnLeft)"/>
    </g>

    <!-- 16 ▸ Reflection gradient fade -->
    <rect x="0" y="690" width="1024" height="334"
          fill="url(#reflGrad)" opacity="0.5"/>

    <!-- ── GLASS OVERLAY ── -->

    <!-- 17 ▸ Glass tint (frosted layer over everything) -->
    <rect width="1024" height="1024"
          fill="url(#glassFill)"/>

    <!-- 19 ▸ Left-edge caustic highlight -->
    <path d="M 0 230 Q 14 430 0 620"
          stroke="rgba(255,255,255,0.14)" stroke-width="2.5"
          fill="none" stroke-linecap="round"/>

    <!-- 20 ▸ Right-edge subtle caustic -->
    <path d="M 1024 290 Q 1010 480 1024 660"
          stroke="rgba(155,200,255,0.10)" stroke-width="2"
          fill="none" stroke-linecap="round"/>

    <!-- ── BORDER ── -->

    <!-- 21 ▸ Outer border glow -->
    <rect x="0" y="0" width="1024" height="1024" rx="228"
          fill="none"
          stroke="url(#borderGlow)" stroke-width="2.5"/>

    <!-- 22 ▸ Inner border (slightly inset) -->
    <rect x="3" y="3" width="1018" height="1018" rx="226"
          fill="none"
          stroke="rgba(155,200,255,0.12)" stroke-width="1"/>

  </g>
</svg>
